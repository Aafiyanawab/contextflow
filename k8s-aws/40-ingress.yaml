# Routes external HTTP into the cluster:
# browser -> EC2 public IP :80 -> Traefik (k3s built-in) -> this rule -> web:80 -> pod:5000
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: contextflow
  namespace: contextflow
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
