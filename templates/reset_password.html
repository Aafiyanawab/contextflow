<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set a new password — ContextFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body class="login-body">

<main class="login-wrap">
    <div class="card login-card">
        <h1>Choose a new password</h1>
        <p class="login-sub">Set a new password for your account. This link works
            once and expires 5 minutes after it was sent.</p>

        {% if error %}
        <div class="error-card active" role="alert">{{ error }}</div>
        {% endif %}

        <form class="email-form" method="POST" id="resetForm"
              action="{{ url_for('auth.reset_password', token=token) }}">
            <label for="password">New password</label>
            <div class="field-wrap">
                <input class="field" type="password" id="password" name="password" required
                       minlength="8" autocomplete="new-password" placeholder="At least 8 characters">
                <button type="button" class="pw-toggle" data-target="password"
                        aria-label="Show password">Show</button>
            </div>
            <label for="confirm">Confirm new password</label>
            <div class="field-wrap">
                <input class="field" type="password" id="confirm" name="confirm" required
                       minlength="8" autocomplete="new-password" placeholder="Re-enter password">
                <button type="button" class="pw-toggle" data-target="confirm"
                        aria-label="Show password">Show</button>
            </div>
            <div class="error-card" id="matchErr" role="alert">Those passwords don't match.</div>
            <button class="btn primary" type="submit"
                    style="justify-content:center; margin-top:4px">Reset password</button>
        </form>
    </div>
    <p class="login-foot">ContextFlow · Context Engineering Platform</p>
</main>

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>
<script nonce="{{ csp_nonce }}">
  // Confirm-match + loading (page-specific; Show/Hide lives in auth.js).
  var form = document.getElementById('resetForm');
  form.addEventListener('submit', function (e) {
    var p = document.getElementById('password').value;
    var c = document.getElementById('confirm').value;
    var err = document.getElementById('matchErr');
    if (p !== c) { e.preventDefault(); err.classList.add('active'); return; }
    var b = form.querySelector('button[type=submit]');
    if (b) { b.disabled = true; b.innerHTML = '<span class="spinner"></span> Resetting…'; }
  });
</script>
</body>
</html>
