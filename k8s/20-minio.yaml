# MinIO: S3-compatible object store standing in for AWS S3 locally.
# PVC + Deployment + Service, plus a run-once Job to create the bucket.
# Root credentials reuse the AWS_* values from the Secret, so the app and
# MinIO agree on the same access key/secret.

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-pvc
  namespace: contextflow
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio
  namespace: contextflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: minio
    spec:
      containers:
        - name: minio
          image: minio/minio
          args: ["server", "/data", "--console-address", ":9001"]
          ports:
            - containerPort: 9000    # S3 API
            - containerPort: 9001    # web console
          env:
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef: { name: contextflow-secrets, key: AWS_ACCESS_KEY_ID }
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef: { name: contextflow-secrets, key: AWS_SECRET_ACCESS_KEY }
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet: { path: /minio/health/ready, port: 9000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: contextflow
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
---
apiVersion: batch/v1
kind: Job
metadata:
  name: minio-createbucket
  namespace: contextflow
spec:
  backoffLimit: 10                   # retry until MinIO is up
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mc
          image: minio/mc
          command:
            - /bin/sh
            - -c
            - |
              until mc alias set local http://minio:9000 minioadmin minioadmin; do
                echo "waiting for minio..."; sleep 2;
              done
              mc mb --ignore-existing local/contextflow-uploads
              echo "bucket ready"
