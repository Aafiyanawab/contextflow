# Postgres: PVC (storage) + Deployment (the DB) + Service (stable address).
# In-cluster Postgres for the local build; production will swap this for RDS
# (the app only reads DATABASE_URL, so nothing else changes).

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: contextflow
spec:
  accessModes: ["ReadWriteOnce"]     # one node mounts it read-write
  resources:
    requests:
      storage: 1Gi                   # k3s local-path provisioner fulfills this
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: contextflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate                   # never run two Postgres on one volume
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef: { name: contextflow-config, key: POSTGRES_USER }
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef: { name: contextflow-config, key: POSTGRES_DB }
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: { name: contextflow-secrets, key: POSTGRES_PASSWORD }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata   # init in a subdir of the mount
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:            # pod is "Ready" only once the DB accepts connections
            exec:
              command: ["pg_isready", "-U", "contextflow"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits: { memory: "512Mi" }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: contextflow
spec:
  selector:
    app: postgres                    # routes to pods with label app=postgres
  ports:
    - port: 5432
      targetPort: 5432
