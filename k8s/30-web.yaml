# The app itself. Runs the image we built + imported into the cluster.
# The container's entrypoint runs `flask db upgrade` then gunicorn, so it
# needs Postgres reachable first — the initContainer guarantees that.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: contextflow
spec:
  replicas: 1                        # 1 for now: the rate limiter is per-process
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z postgres 5432; do echo 'waiting for postgres'; sleep 2; done"
      containers:
        - name: web
          image: contextflow-web:latest
          imagePullPolicy: IfNotPresent   # use the imported image, don't pull
          ports:
            - containerPort: 5000
          envFrom:
            - configMapRef: { name: contextflow-config }   # S3_*, AWS_REGION, POSTGRES_*
            - secretRef: { name: contextflow-secrets }      # SECRET_KEY, DATABASE_URL, keys...
          readinessProbe:              # ready = serving /login
            httpGet: { path: /login, port: 5000 }
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:               # restart if it stops serving
            httpGet: { path: /login, port: 5000 }
            initialDelaySeconds: 40
            periodSeconds: 10
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { memory: "1Gi" }
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: contextflow
spec:
  selector:
    app: web
  ports:
    - port: 80                       # service listens on 80
      targetPort: 5000               # forwards to gunicorn on 5000
