# Prometheus scrape config. Deliberately small: 4 jobs, 30s interval, and
# NO node-exporter / kube-state-metrics — node + pod + container CPU/memory
# come straight from the kubelet (resource + cadvisor) via the API-server
# proxy, which keeps the footprint tiny on the t3.small.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      scrape_timeout: 10s
      evaluation_interval: 30s
      external_labels:
        cluster: contextflow-k3s

    scrape_configs:
      # 1) Prometheus itself.
      - job_name: prometheus
        static_configs:
          - targets: ['localhost:9090']

      # 2) The ContextFlow app /metrics (token-gated). The Service lives in
      #    the contextflow namespace; we scrape it over cluster DNS.
      - job_name: contextflow-app
        metrics_path: /metrics
        authorization:
          type: Bearer
          credentials_file: /etc/prometheus/secrets/metrics-token
        static_configs:
          - targets: ['web.contextflow.svc.cluster.local:80']
            labels:
              app: contextflow

      # 3) Kubelet cAdvisor -> per-pod / per-container CPU & memory.
      - job_name: kubelet-cadvisor
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # 4) Kubelet resource endpoint -> node & pod CPU/memory (no exporter).
      - job_name: kubelet-resource
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/resource
