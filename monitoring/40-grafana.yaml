# Grafana: single replica, tight limits, 1Gi local-path volume (its SQLite
# state). Datasource + dashboard providers are provisioned from ConfigMaps;
# admin credentials come from the grafana-admin Secret (created out-of-band,
# see docs/MONITORING.md). ClusterIP only — reach it via port-forward.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: contextflow
        orgId: 1
        folder: ContextFlow
        type: file
        disableDeletion: true
        editable: true
        options:
          path: /etc/dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels: { app: grafana }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: grafana }
  template:
    metadata:
      labels: { app: grafana }
    spec:
      securityContext:
        runAsUser: 472
        runAsNonRoot: true
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-user } }
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: { secretKeyRef: { name: grafana-admin, key: admin-password } }
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_ANALYTICS_REPORTING_ENABLED
              value: "false"
            - name: GF_ANALYTICS_CHECK_FOR_UPDATES
              value: "false"
          ports:
            - containerPort: 3000
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { memory: "200Mi" }
          readinessProbe:
            httpGet: { path: /api/health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 10
          volumeMounts:
            - { name: data, mountPath: /var/lib/grafana }
            - { name: datasources, mountPath: /etc/grafana/provisioning/datasources }
            - { name: dash-provider, mountPath: /etc/grafana/provisioning/dashboards }
            - { name: dashboards, mountPath: /etc/dashboards }
      volumes:
        - name: data
          persistentVolumeClaim: { claimName: grafana-data }
        - name: datasources
          configMap: { name: grafana-datasources }
        - name: dash-provider
          configMap: { name: grafana-dashboard-provider }
        - name: dashboards
          configMap: { name: grafana-dashboards }
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: ClusterIP
  selector: { app: grafana }
  ports:
    - port: 3000
      targetPort: 3000
